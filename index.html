<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Macro Tracker</title>
<meta name="theme-color" content="#1C1C1A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Macros" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1C1C1A;--bg2:#252522;--bg3:#2F2F2B;
  --border:#3A3A35;--text:#F0EDE4;--muted:#8A8880;--hint:#5A5A56;
  --accent:#E09447;--accent2:#B97030;
  --green:#4DAA7A;--blue:#6B8FD4;--purple:#9B7FD4;--red:#D9534F;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html{font-size:15px}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;display:flex;flex-direction:column}
 
/* Header */
header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:.7rem 1.1rem}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.65rem}
.app-title{font-size:12px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.date-badge{font-size:12px;color:var(--muted);background:var(--bg2);border:1px solid var(--border);border-radius:20px;padding:3px 10px}
.goals-main{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:7px}
.goal{display:flex;flex-direction:column;gap:3px}
.goal-head{display:flex;justify-content:space-between;align-items:baseline}
.goal-label{font-size:10px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.goal-remain{font-size:10px;color:var(--hint)}
.goal-val{font-size:19px;font-weight:600}
.goal-val span{font-size:10px;font-weight:400;color:var(--muted);margin-left:2px}
.track{height:3px;background:var(--bg3);border-radius:99px;overflow:hidden}
.fill{height:100%;border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.fill.ok{background:var(--green)!important}
.fill.over{background:var(--red)!important}
.goals-sec{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.goal-sm{display:flex;justify-content:space-between;align-items:center;background:var(--bg2);border-radius:6px;padding:5px 9px}
.goal-sm-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.goal-sm-val{font-size:14px;font-weight:600}
.goal-sm-val span{font-size:10px;font-weight:400;color:var(--muted);margin-left:1px}
 
/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--bg);padding:0 1.1rem;overflow-x:auto}
.tab{font-size:13px;font-weight:500;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;padding:.6rem 0;cursor:pointer;margin-right:1.25rem;transition:color .15s,border-color .15s;white-space:nowrap;flex-shrink:0}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab:hover:not(.active){color:var(--text)}
 
/* Main */
main{flex:1;overflow-y:auto;padding:1.1rem;max-width:640px;width:100%;margin:0 auto}
.panel{display:none}
.panel.active{display:block}
.section-label{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--hint);margin-bottom:.55rem;margin-top:1.1rem}
.section-label:first-child{margin-top:0}
 
/* Saisie rapide */
.fast-box{background:var(--bg2);border:1px solid var(--accent2);border-radius:10px;padding:12px}
.fast-row{display:grid;grid-template-columns:repeat(4,1fr) auto;gap:7px;align-items:flex-end}
.fast-field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;text-align:center}
.fast-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:15px;font-weight:600;padding:9px 6px;outline:none;text-align:center;transition:border-color .15s}
.fast-field input:focus{border-color:var(--accent)}
.fast-field input::placeholder{color:var(--hint);font-weight:400;font-size:13px}
.fast-add-btn{background:var(--accent);color:#1C1C1A;border:none;border-radius:8px;font-family:var(--font);font-size:22px;font-weight:700;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .15s,transform .1s}
.fast-add-btn:hover{background:#d08840}
.fast-add-btn:active{transform:scale(.95)}
 
/* Quick grid */
.quick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:8px}
.qbtn{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;cursor:pointer;text-align:left;transition:background .12s,border-color .12s}
.qbtn:hover{background:var(--bg3);border-color:var(--accent2)}
.qbtn:active{transform:scale(.97)}
.qbtn-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.qbtn-macros{font-size:11px;color:var(--muted);margin-top:3px}
.qbtn-macros .p{color:var(--green)}
.qbtn-macros .f{color:var(--purple)}
 
/* Forms */
.form-grid{display:grid;gap:10px}
.field label{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.field input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:14px;padding:9px 12px;outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--hint)}
.four-cols{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.btn-primary{width:100%;background:var(--accent);color:#1C1C1A;border:none;border-radius:8px;font-family:var(--font);font-size:14px;font-weight:600;padding:11px;cursor:pointer;transition:background .15s,transform .1s}
.btn-primary:hover{background:#d08840}
.btn-primary:active{transform:scale(.98)}
.btn-secondary{background:var(--bg2);color:var(--muted);border:1px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;padding:8px 14px;cursor:pointer;transition:color .15s,border-color .15s}
.btn-secondary:hover{color:var(--text);border-color:var(--muted)}
 
/* Log */
.log-empty{text-align:center;color:var(--hint);font-size:14px;padding:3rem 0}
.log-entry{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.log-entry:last-of-type{border-bottom:none}
.log-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-left:2px}
.log-info{flex:1;min-width:0}
.log-name{font-size:14px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-sub{font-size:11px;color:var(--hint);margin-top:1px}
.log-right{text-align:right;flex-shrink:0}
.log-kcal{font-size:13px;font-weight:600;color:var(--text)}
.log-prot{font-size:11px;color:var(--green)}
.log-del{background:none;border:none;color:var(--hint);cursor:pointer;font-size:18px;line-height:1;padding:0 4px;transition:color .15s;flex-shrink:0}
.log-del:hover{color:var(--red)}
.log-total{display:flex;justify-content:space-between;padding:12px 0 0;border-top:1px solid var(--border);margin-top:4px}
.total-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.total-val{font-size:13px;font-weight:600;color:var(--text)}
 
/* Ingredients */
.ing-list{display:grid;gap:8px}
.ing-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.ing-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px}
.ing-name-display{font-size:14px;font-weight:500;color:var(--text)}
.ing-macros-display{font-size:11px;color:var(--muted);margin-top:2px}
.ing-header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.ing-edit-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:12px;padding:4px 9px;cursor:pointer;font-family:var(--font);transition:color .15s,border-color .15s;white-space:nowrap}
.ing-edit-btn:hover,.ing-edit-btn.active{color:var(--accent);border-color:var(--accent2)}
.ing-del-btn{background:none;border:none;color:var(--hint);cursor:pointer;font-size:17px;line-height:1;padding:0 2px;transition:color .15s}
.ing-del-btn:hover{color:var(--red)}
.ing-form{display:none;padding:0 12px 12px;border-top:1px solid var(--border)}
.ing-form.open{display:block}
.ing-form-name{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:var(--font);font-size:14px;padding:8px 11px;outline:none;margin:10px 0 8px;transition:border-color .15s}
.ing-form-name:focus{border-color:var(--accent)}
.ing-nums{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;margin-bottom:10px}
.ing-num-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px;text-align:center}
.ing-num-field input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:13px;font-weight:600;padding:7px 4px;outline:none;text-align:center;transition:border-color .15s}
.ing-num-field input:focus{border-color:var(--accent)}
.ing-save-btn{width:100%;background:var(--accent);color:#1C1C1A;border:none;border-radius:7px;font-family:var(--font);font-size:13px;font-weight:600;padding:9px;cursor:pointer;transition:background .15s}
.ing-save-btn:hover{background:#d08840}
.new-ing-card{background:var(--bg2);border:1px dashed var(--border);border-radius:10px;padding:12px}
.new-ing-card .ing-form-name{margin-top:0}
 
/* Settings */
.settings-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:.9rem 1.1rem;margin-bottom:1rem}
.settings-card h3{font-size:13px;font-weight:600;color:var(--text);margin-bottom:.7rem}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-row label{font-size:13px;color:var(--muted)}
.setting-row input{background:var(--bg3);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--font);font-size:14px;padding:5px 9px;width:90px;text-align:right;outline:none}
.setting-row input:focus{border-color:var(--accent)}
.danger-zone{margin-top:1.5rem}
.danger-zone .settings-card{border-color:#4a2020}
 
/* Bottom sheet */
.sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50}
.sheet-overlay.open{display:block}
.sheet{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);border-radius:16px 16px 0 0;padding:1.25rem 1.25rem 2rem;z-index:51;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:99px;margin:0 auto 1rem}
.sheet-name{font-size:16px;font-weight:600;color:var(--text);margin-bottom:1rem;text-align:center}
.sheet-qty-row{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:1rem}
.qty-btn{background:var(--bg3);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:20px;font-weight:600;width:44px;height:44px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0}
.qty-btn:hover{background:var(--border)}
.qty-input{background:var(--bg3);border:1px solid var(--accent2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:22px;font-weight:700;width:90px;padding:8px;text-align:center;outline:none}
.sheet-preview{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.1rem}
.sheet-macro{background:var(--bg3);border-radius:8px;padding:8px 6px;text-align:center}
.sheet-macro-val{font-size:16px;font-weight:700}
.sheet-macro-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.sheet-confirm{width:100%;background:var(--accent);color:#1C1C1A;border:none;border-radius:10px;font-family:var(--font);font-size:15px;font-weight:700;padding:13px;cursor:pointer;transition:background .15s}
.sheet-confirm:hover{background:#d08840}
.sheet-cancel{width:100%;background:none;border:none;color:var(--muted);font-family:var(--font);font-size:14px;padding:10px;cursor:pointer;margin-top:6px}
 
/* Toast */
#toast{position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:8px 18px;font-size:13px;color:var(--text);opacity:0;transition:transform .22s,opacity .22s;pointer-events:none;white-space:nowrap;z-index:100}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
 
@media(max-width:380px){
  .fast-row{grid-template-columns:repeat(2,1fr) auto}
  .four-cols{grid-template-columns:repeat(2,1fr)}
  .ing-nums{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>
 
<header>
  <div class="header-top">
    <span class="app-title">Macro Tracker</span>
    <span class="date-badge" id="date-badge"></span>
  </div>
  <div class="goals-main">
    <div class="goal">
      <div class="goal-head">
        <span class="goal-label" style="color:var(--accent)">Calories</span>
        <span class="goal-remain" id="kcal-remain"></span>
      </div>
      <div class="goal-val" style="color:var(--accent)" id="kcal-cur">0 <span>kcal</span></div>
      <div class="track"><div class="fill" id="kcal-fill" style="width:0%;background:var(--accent)"></div></div>
    </div>
    <div class="goal">
      <div class="goal-head">
        <span class="goal-label" style="color:var(--green)">Proteines</span>
        <span class="goal-remain" id="prot-remain"></span>
      </div>
      <div class="goal-val" style="color:var(--green)" id="prot-cur">0 <span>g</span></div>
      <div class="track"><div class="fill" id="prot-fill" style="width:0%;background:var(--green)"></div></div>
    </div>
  </div>
  <div class="goals-sec">
    <div class="goal-sm">
      <span class="goal-sm-label" style="color:var(--blue)">Glucides</span>
      <span class="goal-sm-val" style="color:var(--blue)" id="carb-cur">0 <span>g</span></span>
    </div>
    <div class="goal-sm">
      <span class="goal-sm-label" style="color:var(--purple)">Fibres</span>
      <span class="goal-sm-val" style="color:var(--purple)" id="fiber-cur">0 <span>g</span></span>
    </div>
  </div>
</header>
 
<div class="tabs">
  <button class="tab active" data-tab="add">Ajouter</button>
  <button class="tab" data-tab="log">Journal</button>
  <button class="tab" data-tab="ingredients">Aliments</button>
  <button class="tab" data-tab="settings">Objectifs</button>
</div>
 
<main>
  <div class="panel active" id="panel-add">
    <div class="section-label" style="margin-top:0">Saisie rapide</div>
    <div class="fast-box">
      <div class="fast-row">
        <div class="fast-field"><label style="color:var(--accent)">Kcal</label><input type="number" id="f-kcal" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="fast-field"><label style="color:var(--green)">Prot g</label><input type="number" id="f-prot" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="fast-field"><label style="color:var(--blue)">Gluc g</label><input type="number" id="f-carb" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="fast-field"><label style="color:var(--purple)">Fibr g</label><input type="number" id="f-fiber" placeholder="0" min="0" inputmode="numeric"></div>
        <button class="fast-add-btn" id="btn-fast">+</button>
      </div>
    </div>
    <div class="section-label">Raccourcis</div>
    <div class="quick-grid" id="quick-grid"></div>
    <div class="section-label">Avec nom</div>
    <div class="form-grid">
      <div class="field"><label>Aliment</label><input type="text" id="inp-name" placeholder="ex. Poulet roti..."></div>
      <div class="four-cols">
        <div class="field"><label style="color:var(--accent)">Kcal</label><input type="number" id="inp-kcal" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="field"><label style="color:var(--green)">Prot g</label><input type="number" id="inp-prot" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="field"><label style="color:var(--blue)">Gluc g</label><input type="number" id="inp-carb" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="field"><label style="color:var(--purple)">Fibr g</label><input type="number" id="inp-fiber" placeholder="0" min="0" inputmode="numeric"></div>
      </div>
      <button class="btn-primary" id="btn-add">+ Ajouter au journal</button>
    </div>
  </div>
 
  <div class="panel" id="panel-log">
    <div id="log-content"></div>
  </div>
 
  <div class="panel" id="panel-ingredients">
    <div class="section-label" style="margin-top:0">Modifier les raccourcis</div>
    <div class="ing-list" id="ing-list"></div>
    <div class="section-label">Ajouter un aliment</div>
    <div class="new-ing-card">
      <input class="ing-form-name" type="text" id="new-ing-name" placeholder="Nom de l'aliment...">
      <div class="ing-nums">
        <div class="ing-num-field"><label style="color:var(--muted)">Ref g</label><input type="number" id="new-ing-ref" placeholder="100" min="1" inputmode="numeric"></div>
        <div class="ing-num-field"><label style="color:var(--accent)">Kcal</label><input type="number" id="new-ing-kcal" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="ing-num-field"><label style="color:var(--green)">Prot</label><input type="number" id="new-ing-prot" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="ing-num-field"><label style="color:var(--blue)">Gluc</label><input type="number" id="new-ing-carb" placeholder="0" min="0" inputmode="numeric"></div>
        <div class="ing-num-field"><label style="color:var(--purple)">Fibr</label><input type="number" id="new-ing-fiber" placeholder="0" min="0" inputmode="numeric"></div>
      </div>
      <button class="ing-save-btn" id="btn-new-ing">+ Ajouter aux raccourcis</button>
    </div>
  </div>
 
  <div class="panel" id="panel-settings">
    <div class="settings-card">
      <h3>Objectifs journaliers</h3>
      <div class="setting-row"><label>Calories (kcal)</label><input type="number" id="s-kcal" inputmode="numeric"></div>
      <div class="setting-row"><label>Proteines (g)</label><input type="number" id="s-prot" inputmode="numeric"></div>
      <div class="setting-row"><label>Glucides (g)</label><input type="number" id="s-carb" inputmode="numeric"></div>
      <div class="setting-row"><label>Fibres (g)</label><input type="number" id="s-fiber" inputmode="numeric"></div>
    </div>
    <button class="btn-primary" id="btn-save-goals">Enregistrer</button>
    <div class="danger-zone">
      <div class="settings-card">
        <h3 style="color:#D9534F">Remise a zero</h3>
        <div class="setting-row" style="border:none;flex-wrap:wrap;gap:8px">
          <label style="font-size:12px">Journal du jour</label>
          <button class="btn-secondary" id="btn-reset">Reset journal</button>
        </div>
        <div class="setting-row" style="border:none;flex-wrap:wrap;gap:8px">
          <label style="font-size:12px">Remettre les aliments par defaut</label>
          <button class="btn-secondary" id="btn-reset-ing">Reset aliments</button>
        </div>
      </div>
    </div>
  </div>
</main>
 
<!-- Bottom sheet -->
<div class="sheet-overlay" id="sheet-overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-name" id="sheet-title"></div>
  <div class="sheet-qty-row">
    <button class="qty-btn" id="qty-minus">-</button>
    <input class="qty-input" type="number" id="qty-input" value="100" min="1" step="10" inputmode="numeric">
    <span style="font-size:13px;color:var(--muted)">g</span>
  </div>
  <div class="sheet-preview">
    <div class="sheet-macro"><div class="sheet-macro-val" id="prev-kcal" style="color:var(--accent)">0</div><div class="sheet-macro-lbl">kcal</div></div>
    <div class="sheet-macro"><div class="sheet-macro-val" id="prev-prot" style="color:var(--green)">0g</div><div class="sheet-macro-lbl">prot</div></div>
    <div class="sheet-macro"><div class="sheet-macro-val" id="prev-carb" style="color:var(--blue)">0g</div><div class="sheet-macro-lbl">gluc</div></div>
    <div class="sheet-macro"><div class="sheet-macro-val" id="prev-fiber" style="color:var(--purple)">0g</div><div class="sheet-macro-lbl">fibres</div></div>
  </div>
  <button class="sheet-confirm" id="sheet-confirm">+ Ajouter au journal</button>
  <button class="sheet-cancel" id="sheet-cancel">Annuler</button>
</div>
 
<div id="toast"></div>
 
<script>
// ── Data ──
var DEFAULT_QUICK = [
  {id:1,  name:"Skyr",        ref:150, kcal:98,  prot:16, carb:6,  fiber:0},
  {id:2,  name:"Oeuf entier", ref:60,  kcal:78,  prot:6,  carb:0,  fiber:0},
  {id:3,  name:"Blanc oeuf",  ref:33,  kcal:17,  prot:4,  carb:0,  fiber:0},

// ── Storage ──
function load(k, def) {
  try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch(e) { return def; }
}
function save(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {}
}
function dayKey() {
  return 'entries_' + new Date().toISOString().slice(0,10);
}
 
// ── State ──
var goals   = load('goals_v2', {kcal:1500, prot:150, carb:150, fiber:25});
var entries = load(dayKey(), []);
var quick   = load('quick_v2', null);
if (!quick || !Array.isArray(quick) || quick.length === 0) {
  quick = JSON.parse(JSON.stringify(DEFAULT_QUICK));
  save('quick_v2', quick);
}
 
// ── Helpers ──
function fmt(n) { return Math.round(n); }
function totals() {
  return entries.reduce(function(a,e){ a.kcal+=e.kcal; a.prot+=e.prot; a.carb+=e.carb; a.fiber+=e.fiber; return a; }, {kcal:0,prot:0,carb:0,fiber:0});
}
function pct(v,m) { return Math.min(100, Math.round(v/m*100)); }
function fillClass(v,m) { var r=v/m; return r>=1.05?'over':r>=0.9?'ok':''; }
 
// ── Render header ──
function renderHeader() {
  var t = totals();
  document.getElementById('kcal-cur').innerHTML  = fmt(t.kcal)  + ' <span>kcal</span>';
  document.getElementById('prot-cur').innerHTML  = fmt(t.prot)  + ' <span>g</span>';
  document.getElementById('carb-cur').innerHTML  = fmt(t.carb)  + ' <span>g</span>';
  document.getElementById('fiber-cur').innerHTML = fmt(t.fiber) + ' <span>g</span>';
  var rK = Math.max(0, goals.kcal - t.kcal);
  var rP = Math.max(0, goals.prot - t.prot);
  document.getElementById('kcal-remain').textContent = rK>0 ? '-'+fmt(rK) : '+'+fmt(t.kcal-goals.kcal);
  document.getElementById('prot-remain').textContent = rP>0 ? '-'+fmt(rP)+'g' : '+'+fmt(t.prot-goals.prot)+'g';
  var kf = document.getElementById('kcal-fill');
  kf.style.width = pct(t.kcal,goals.kcal)+'%';
  kf.className = 'fill ' + fillClass(t.kcal,goals.kcal);
  if (!kf.className.includes('ok') && !kf.className.includes('over')) kf.style.background='var(--accent)'; else kf.style.background='';
  var pf = document.getElementById('prot-fill');
  pf.style.width = pct(t.prot,goals.prot)+'%';
  pf.className = 'fill ' + fillClass(t.prot,goals.prot);
  if (!pf.className.includes('ok') && !pf.className.includes('over')) pf.style.background='var(--green)'; else pf.style.background='';
}
 
// ── Render quick ──
function renderQuick() {
  var html = '';
  for (var i=0; i<quick.length; i++) {
    var q = quick[i];
    var fs = q.fiber ? ' &middot; <span class="f">'+q.fiber+'g F</span>' : '';
    html += '<button class="qbtn" data-qid="'+q.id+'">'
          + '<div class="qbtn-name">'+q.name+'</div>'
          + '<div class="qbtn-macros">'+q.ref+'g &middot; <span class="p">'+q.prot+'g P</span>'+fs+'</div>'
          + '</button>';
  }
  document.getElementById('quick-grid').innerHTML = html;
  // Attach events
  var btns = document.getElementById('quick-grid').querySelectorAll('.qbtn');
  for (var j=0; j<btns.length; j++) {
    btns[j].addEventListener('click', function() {
      openSheet(parseInt(this.getAttribute('data-qid')));
    });
  }
}
 
// ── Render log ──
function renderLog() {
  var c = document.getElementById('log-content');
  if (!entries.length) {
    c.innerHTML = '<div class="log-empty">Aucun aliment enregistre<br><span style="font-size:12px">Utilisez la saisie rapide</span></div>';
    return;
  }
  var t = totals();
  var html = '';
  var rev = entries.slice().reverse();
  for (var i=0; i<rev.length; i++) {
    var e = rev[i];
    var sub = [e.time, e.carb?fmt(e.carb)+'g G':null, e.fiber?fmt(e.fiber)+'g F':null].filter(Boolean).join(' - ');
    html += '<div class="log-entry">'
          + '<div class="log-dot"></div>'
          + '<div class="log-info"><div class="log-name">'+e.name+'</div><div class="log-sub">'+sub+'</div></div>'
          + '<div class="log-right"><div class="log-kcal">'+fmt(e.kcal)+' kcal</div><div class="log-prot">'+fmt(e.prot)+'g P</div></div>'
          + '<button class="log-del" data-eid="'+e.id+'">x</button>'
          + '</div>';
  }
  html += '<div class="log-total"><span class="total-label">Total</span>'
        + '<span class="total-val">'+fmt(t.kcal)+' kcal - '+fmt(t.prot)+'g P - '+fmt(t.carb)+'g G - '+fmt(t.fiber)+'g F</span></div>';
  c.innerHTML = html;
  var dels = c.querySelectorAll('.log-del');
  for (var j=0; j<dels.length; j++) {
    dels[j].addEventListener('click', function() {
      removeEntry(parseInt(this.getAttribute('data-eid')));
    });
  }
}
 
// ── Render ingredients ──
function renderIngredients() {
  var html = '';
  for (var i=0; i<quick.length; i++) {
    var q = quick[i];
    var fs = q.fiber ? ' - '+q.fiber+'g F' : '';
    html += '<div class="ing-card">'
          + '<div class="ing-header">'
          + '<div><div class="ing-name-display">'+q.name+'</div>'
          + '<div class="ing-macros-display">ref '+q.ref+'g - '+q.kcal+' kcal - '+q.prot+'g P - '+q.carb+'g G'+fs+'</div></div>'
          + '<div class="ing-header-right">'
          + '<button class="ing-edit-btn" data-iid="'+q.id+'">Modifier</button>'
          + '<button class="ing-del-btn" data-iid="'+q.id+'">x</button>'
          + '</div></div>'
          + '<div class="ing-form" id="ing-form-'+q.id+'">'
          + '<input class="ing-form-name" type="text" id="ing-n-'+q.id+'" value="'+q.name+'" placeholder="Nom">'
          + '<div class="ing-nums">'
          + '<div class="ing-num-field"><label style="color:var(--muted)">Ref g</label><input type="number" id="ing-r-'+q.id+'" value="'+q.ref+'" min="1" inputmode="numeric"></div>'
          + '<div class="ing-num-field"><label style="color:var(--accent)">Kcal</label><input type="number" id="ing-k-'+q.id+'" value="'+q.kcal+'" min="0" inputmode="numeric"></div>'
          + '<div class="ing-num-field"><label style="color:var(--green)">Prot</label><input type="number" id="ing-p-'+q.id+'" value="'+q.prot+'" min="0" inputmode="numeric"></div>'
          + '<div class="ing-num-field"><label style="color:var(--blue)">Gluc</label><input type="number" id="ing-c-'+q.id+'" value="'+q.carb+'" min="0" inputmode="numeric"></div>'
          + '<div class="ing-num-field"><label style="color:var(--purple)">Fibr</label><input type="number" id="ing-f-'+q.id+'" value="'+q.fiber+'" min="0" inputmode="numeric"></div>'
          + '</div>'
          + '<button class="ing-save-btn" data-iid="'+q.id+'">Enregistrer</button>'
          + '</div></div>';
  }
  document.getElementById('ing-list').innerHTML = html;
 
  // Edit buttons
  var editBtns = document.getElementById('ing-list').querySelectorAll('.ing-edit-btn');
  for (var j=0; j<editBtns.length; j++) {
    editBtns[j].addEventListener('click', function() {
      var id = this.getAttribute('data-iid');
      var form = document.getElementById('ing-form-'+id);
      var open = form.classList.toggle('open');
      this.textContent = open ? 'Fermer' : 'Modifier';
      this.classList.toggle('active', open);
    });
  }
  // Delete buttons
  var delBtns = document.getElementById('ing-list').querySelectorAll('.ing-del-btn');
  for (var k=0; k<delBtns.length; k++) {
    delBtns[k].addEventListener('click', function() {
      var id = parseInt(this.getAttribute('data-iid'));
      var q = quick.find(function(x){return x.id===id;});
      if (!q || !confirm('Supprimer "'+q.name+'" ?')) return;
      quick = quick.filter(function(x){return x.id!==id;});
      save('quick_v2', quick);
      renderIngredients(); renderQuick();
      toast('Aliment supprime');
    });
  }
  // Save buttons
  var saveBtns = document.getElementById('ing-list').querySelectorAll('.ing-save-btn');
  for (var l=0; l<saveBtns.length; l++) {
    saveBtns[l].addEventListener('click', function() {
      var id = parseInt(this.getAttribute('data-iid'));
      var idx = quick.findIndex(function(x){return x.id===id;});
      if (idx===-1) return;
      quick[idx] = {
        id: id,
        name:  document.getElementById('ing-n-'+id).value.trim() || quick[idx].name,
        ref:   parseFloat(document.getElementById('ing-r-'+id).value) || 100,
        kcal:  parseFloat(document.getElementById('ing-k-'+id).value) || 0,
        prot:  parseFloat(document.getElementById('ing-p-'+id).value) || 0,
        carb:  parseFloat(document.getElementById('ing-c-'+id).value) || 0,
        fiber: parseFloat(document.getElementById('ing-f-'+id).value) || 0
      };
      save('quick_v2', quick);
      renderIngredients(); renderQuick();
      toast('Mis a jour');
    });
  }
}
 
// ── Render settings ──
function renderSettings() {
  document.getElementById('s-kcal').value  = goals.kcal;
  document.getElementById('s-prot').value  = goals.prot;
  document.getElementById('s-carb').value  = goals.carb;
  document.getElementById('s-fiber').value = goals.fiber;
}
 
function render() { renderHeader(); renderLog(); }
 
// ── Toast ──
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 1800);
}
 
// ── Add entry ──
function addEntry(name, kcal, prot, carb, fiber) {
  var time = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  entries.push({id:Date.now(), name:name, kcal:parseFloat(kcal)||0, prot:parseFloat(prot)||0, carb:parseFloat(carb)||0, fiber:parseFloat(fiber)||0, time:time});
  save(dayKey(), entries);
  render();
  toast('Ajoute : ' + name);
}
 
function removeEntry(id) {
  entries = entries.filter(function(e){ return e.id!==id; });
  save(dayKey(), entries);
  render();
}
 
// ── Bottom sheet ──
var _sheetItem = null;
 
function openSheet(id) {
  var q = null;
  for (var i=0; i<quick.length; i++) { if (quick[i].id===id) { q=quick[i]; break; } }
  if (!q) return;
  _sheetItem = q;
  document.getElementById('sheet-title').textContent = q.name;
  document.getElementById('qty-input').value = q.ref || 100;
  updatePreview();
  document.getElementById('sheet-overlay').classList.add('open');
  document.getElementById('sheet').classList.add('open');
  setTimeout(function(){ document.getElementById('qty-input').select(); }, 350);
}
 
function closeSheet() {
  document.getElementById('sheet-overlay').classList.remove('open');
  document.getElementById('sheet').classList.remove('open');
}
 
function updatePreview() {
  if (!_sheetItem) return;
  var g = parseFloat(document.getElementById('qty-input').value) || 1;
  var r = _sheetItem.ref || 100;
  var ratio = g / r;
  document.getElementById('prev-kcal').textContent  = fmt(_sheetItem.kcal  * ratio);
  document.getElementById('prev-prot').textContent  = fmt(_sheetItem.prot  * ratio) + 'g';
  document.getElementById('prev-carb').textContent  = fmt(_sheetItem.carb  * ratio) + 'g';
  document.getElementById('prev-fiber').textContent = fmt(_sheetItem.fiber * ratio) + 'g';
}
 
document.getElementById('qty-input').addEventListener('input', updatePreview);
document.getElementById('qty-minus').addEventListener('click', function(){
  var inp = document.getElementById('qty-input');
  inp.value = Math.max(1, (parseInt(inp.value)||100) - 10);
  updatePreview();
});
document.getElementById('sheet-confirm').addEventListener('click', function(){
  if (!_sheetItem) return;
  var g = parseFloat(document.getElementById('qty-input').value) || 1;
  var r = _sheetItem.ref || 100;
  var ratio = g / r;
  addEntry(_sheetItem.name + ' ' + g + 'g', _sheetItem.kcal*ratio, _sheetItem.prot*ratio, _sheetItem.carb*ratio, _sheetItem.fiber*ratio);
  closeSheet();
});
document.getElementById('sheet-cancel').addEventListener('click', closeSheet);
document.getElementById('sheet-overlay').addEventListener('click', closeSheet);
 
// qty + button (dynamic, so use +10)
document.getElementById('sheet').querySelector('.sheet-qty-row').addEventListener('click', function(e){
  if (e.target.textContent === '+') {
    var inp = document.getElementById('qty-input');
    inp.value = (parseInt(inp.value)||100) + 10;
    updatePreview();
  }
});
 
// Make + button work
var qtyRow = document.querySelector('.sheet-qty-row');
var plusBtn = document.createElement('button');
plusBtn.className = 'qty-btn'; plusBtn.textContent = '+';
plusBtn.addEventListener('click', function(){
  var inp = document.getElementById('qty-input');
  inp.value = (parseInt(inp.value)||100) + 10;
  updatePreview();
});
// Replace current + btn if any, or just add
// Actually the - btn exists, + is the qty-minus equivalent on the right
// Let's find the qty-minus and add a + after qty-input
var qtyMinus = document.getElementById('qty-minus');
var qtyInput = document.getElementById('qty-input');
qtyInput.parentNode.insertBefore(plusBtn, qtyInput.nextSibling.nextSibling);
 
// ── Tabs ──
var tabs = document.querySelectorAll('.tab');
for (var t=0; t<tabs.length; t++) {
  tabs[t].addEventListener('click', function(){
    document.querySelectorAll('.tab').forEach(function(x){ x.classList.remove('active'); });
    document.querySelectorAll('.panel').forEach(function(x){ x.classList.remove('active'); });
    this.classList.add('active');
    var panel = document.getElementById('panel-'+this.getAttribute('data-tab'));
    if (panel) panel.classList.add('active');
    if (this.getAttribute('data-tab') === 'ingredients') renderIngredients();
  });
}
 
// ── Saisie rapide ──
document.getElementById('btn-fast').addEventListener('click', function(){
  var kcal=document.getElementById('f-kcal').value, prot=document.getElementById('f-prot').value,
      carb=document.getElementById('f-carb').value, fiber=document.getElementById('f-fiber').value;
  if (!kcal && !prot && !carb && !fiber) { document.getElementById('f-kcal').focus(); return; }
  var time = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  addEntry('Repas '+time, kcal, prot, carb, fiber);
  ['f-kcal','f-prot','f-carb','f-fiber'].forEach(function(id){ document.getElementById(id).value=''; });
});
 
// ── Manuel ──
document.getElementById('btn-add').addEventListener('click', function(){
  var name = document.getElementById('inp-name').value.trim();
  if (!name) { document.getElementById('inp-name').focus(); return; }
  addEntry(name, document.getElementById('inp-kcal').value, document.getElementById('inp-prot').value,
           document.getElementById('inp-carb').value, document.getElementById('inp-fiber').value);
  ['inp-name','inp-kcal','inp-prot','inp-carb','inp-fiber'].forEach(function(id){ document.getElementById(id).value=''; });
});
 
// ── Nouvel aliment ──
document.getElementById('btn-new-ing').addEventListener('click', function(){
  var name = document.getElementById('new-ing-name').value.trim();
  if (!name) { document.getElementById('new-ing-name').focus(); return; }
  var newId = Date.now();
  quick.push({
    id: newId, name: name,
    ref:   parseFloat(document.getElementById('new-ing-ref').value)   || 100,
    kcal:  parseFloat(document.getElementById('new-ing-kcal').value)  || 0,
    prot:  parseFloat(document.getElementById('new-ing-prot').value)  || 0,
    carb:  parseFloat(document.getElementById('new-ing-carb').value)  || 0,
    fiber: parseFloat(document.getElementById('new-ing-fiber').value) || 0
  });
  save('quick_v2', quick);
  ['new-ing-name','new-ing-ref','new-ing-kcal','new-ing-prot','new-ing-carb','new-ing-fiber'].forEach(function(id){ document.getElementById(id).value=''; });
  renderIngredients(); renderQuick();
  toast('Aliment ajoute');
});
 
// ── Objectifs ──
document.getElementById('btn-save-goals').addEventListener('click', function(){
  goals.kcal  = parseInt(document.getElementById('s-kcal').value)  || 1500;
  goals.prot  = parseInt(document.getElementById('s-prot').value)  || 150;
  goals.carb  = parseInt(document.getElementById('s-carb').value)  || 150;
  goals.fiber = parseInt(document.getElementById('s-fiber').value) || 25;
  save('goals_v2', goals); render(); toast('Objectifs enregistres');
});
 
// ── Reset ──
document.getElementById('btn-reset').addEventListener('click', function(){
  if (!confirm('Remettre le journal a zero ?')) return;
  entries = []; save(dayKey(), entries); render(); toast('Journal remis a zero');
});
document.getElementById('btn-reset-ing').addEventListener('click', function(){
  if (!confirm('Remettre les aliments par defaut ?')) return;
  quick = JSON.parse(JSON.stringify(DEFAULT_QUICK));
  save('quick_v2', quick);
  renderQuick(); renderIngredients(); toast('Aliments remis par defaut');
});
 
// ── Date ──
var d = new Date();
document.getElementById('date-badge').textContent = d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
 
// ── Init ──
renderQuick();
renderSettings();
render();
</script>
