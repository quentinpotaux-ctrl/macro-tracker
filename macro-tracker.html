<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Macro Tracker</title>
<meta name="theme-color" content="#1C1C1A" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #1C1C1A; --bg2: #252522; --bg3: #2F2F2B;
    --border:  #3A3A35; --text: #F0EDE4; --muted: #8A8880; --hint: #5A5A56;
    --accent:  #E09447; --accent2: #B97030;
    --green:   #4DAA7A; --blue: #6B8FD4; --purple: #9B7FD4; --red: #D9534F;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  }
  html { font-size: 15px; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100dvh; display: flex; flex-direction: column; }

  /* ── Header ── */
  header { position: sticky; top: 0; z-index: 10; background: var(--bg); border-bottom: 1px solid var(--border); padding: 0.7rem 1.1rem; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.65rem; }
  .app-title { font-size: 12px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
  .date-badge { font-size: 12px; color: var(--muted); background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 3px 10px; }
  .goals-main { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 7px; }
  .goal { display: flex; flex-direction: column; gap: 3px; }
  .goal-head { display: flex; justify-content: space-between; align-items: baseline; }
  .goal-label { font-size: 10px; color: var(--muted); letter-spacing: 0.05em; text-transform: uppercase; }
  .goal-remain { font-size: 10px; color: var(--hint); }
  .goal-val { font-size: 19px; font-weight: 600; }
  .goal-val span { font-size: 10px; font-weight: 400; color: var(--muted); margin-left: 2px; }
  .track { height: 3px; background: var(--bg3); border-radius: 99px; overflow: hidden; }
  .fill { height: 100%; border-radius: 99px; transition: width 0.4s cubic-bezier(.4,0,.2,1); }
  .fill.ok   { background: var(--green) !important; }
  .fill.over { background: var(--red)   !important; }
  .goals-sec { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .goal-sm { display: flex; justify-content: space-between; align-items: center; background: var(--bg2); border-radius: 6px; padding: 5px 9px; }
  .goal-sm-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .goal-sm-val { font-size: 14px; font-weight: 600; }
  .goal-sm-val span { font-size: 10px; font-weight: 400; color: var(--muted); margin-left: 1px; }

  /* ── Tabs ── */
  .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); padding: 0 1.1rem; overflow-x: auto; }
  .tab { font-size: 13px; font-weight: 500; color: var(--muted); background: none; border: none; border-bottom: 2px solid transparent; padding: 0.6rem 0; cursor: pointer; margin-right: 1.25rem; transition: color 0.15s, border-color 0.15s; white-space: nowrap; flex-shrink: 0; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── Main ── */
  main { flex: 1; overflow-y: auto; padding: 1.1rem; max-width: 640px; width: 100%; margin: 0 auto; }
  .panel { display: none; }
  .panel.active { display: block; }
  .section-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--hint); margin-bottom: 0.55rem; margin-top: 1.1rem; }
  .section-label:first-child { margin-top: 0; }

  /* ── Saisie rapide ── */
  .fast-box { background: var(--bg2); border: 1px solid var(--accent2); border-radius: 10px; padding: 12px; }
  .fast-row { display: grid; grid-template-columns: repeat(4, 1fr) auto; gap: 7px; align-items: flex-end; }
  .fast-field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; text-align: center; }
  .fast-field input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--font); font-size: 15px; font-weight: 600; padding: 9px 6px; outline: none; text-align: center; transition: border-color 0.15s; }
  .fast-field input:focus { border-color: var(--accent); }
  .fast-field input::placeholder { color: var(--hint); font-weight: 400; font-size: 13px; }
  .fast-add-btn { background: var(--accent); color: #1C1C1A; border: none; border-radius: 8px; font-family: var(--font); font-size: 22px; font-weight: 700; width: 44px; height: 44px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, transform 0.1s; }
  .fast-add-btn:hover { background: #d08840; }
  .fast-add-btn:active { transform: scale(0.95); }

  /* ── Quick grid ── */
  .quick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(138px, 1fr)); gap: 8px; }
  .qbtn { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 10px; cursor: pointer; text-align: left; transition: background 0.12s, border-color 0.12s; }
  .qbtn:hover { background: var(--bg3); border-color: var(--accent2); }
  .qbtn:active { transform: scale(0.97); }
  .qbtn-name { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.3; }
  .qbtn-macros { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .qbtn-macros .p { color: var(--green); }
  .qbtn-macros .f { color: var(--purple); }

  /* ── Forms ── */
  .form-grid { display: grid; gap: 10px; }
  .field label { display: block; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 4px; }
  .field input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--font); font-size: 14px; padding: 9px 12px; outline: none; transition: border-color 0.15s; }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--hint); }
  .four-cols { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
  .btn-primary { width: 100%; background: var(--accent); color: #1C1C1A; border: none; border-radius: 8px; font-family: var(--font); font-size: 14px; font-weight: 600; padding: 11px; cursor: pointer; transition: background 0.15s, transform 0.1s; }
  .btn-primary:hover { background: #d08840; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-secondary { background: var(--bg2); color: var(--muted); border: 1px solid var(--border); border-radius: 8px; font-family: var(--font); font-size: 13px; padding: 8px 14px; cursor: pointer; transition: color 0.15s, border-color 0.15s; }
  .btn-secondary:hover { color: var(--text); border-color: var(--muted); }

  /* ── Log ── */
  .log-empty { text-align: center; color: var(--hint); font-size: 14px; padding: 3rem 0; }
  .log-entry { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .log-entry:last-of-type { border-bottom: none; }
  .log-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-left: 2px; }
  .log-info { flex: 1; min-width: 0; }
  .log-name { font-size: 14px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .log-sub { font-size: 11px; color: var(--hint); margin-top: 1px; }
  .log-right { text-align: right; flex-shrink: 0; }
  .log-kcal { font-size: 13px; font-weight: 600; color: var(--text); }
  .log-prot { font-size: 11px; color: var(--green); }
  .log-del { background: none; border: none; color: var(--hint); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; transition: color 0.15s; flex-shrink: 0; }
  .log-del:hover { color: var(--red); }
  .log-total { display: flex; justify-content: space-between; padding: 12px 0 0; border-top: 1px solid var(--border); margin-top: 4px; }
  .total-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .total-val { font-size: 13px; font-weight: 600; color: var(--text); }

  /* ── Ingredients editor ── */
  .ing-list { display: grid; gap: 8px; }
  .ing-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .ing-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; cursor: pointer; transition: background 0.12s; }
  .ing-header:hover { background: var(--bg3); }
  .ing-name-display { font-size: 14px; font-weight: 500; color: var(--text); }
  .ing-macros-display { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .ing-header-right { display: flex; align-items: center; gap: 8px; }
  .ing-edit-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 12px; padding: 4px 9px; cursor: pointer; font-family: var(--font); transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
  .ing-edit-btn:hover { color: var(--accent); border-color: var(--accent2); }
  .ing-edit-btn.active { color: var(--accent); border-color: var(--accent2); background: rgba(224,148,71,0.08); }
  .ing-del-btn { background: none; border: none; color: var(--hint); cursor: pointer; font-size: 17px; line-height: 1; padding: 0 2px; transition: color 0.15s; }
  .ing-del-btn:hover { color: var(--red); }
  .ing-form { display: none; padding: 0 12px 12px; border-top: 1px solid var(--border); }
  .ing-form.open { display: block; }
  .ing-form-name { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--font); font-size: 14px; padding: 8px 11px; outline: none; margin: 10px 0 8px; transition: border-color 0.15s; }
  .ing-form-name:focus { border-color: var(--accent); }
  .ing-nums { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 10px; }
  .ing-num-field label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 3px; text-align: center; }
  .ing-num-field input { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 14px; font-weight: 600; padding: 7px 4px; outline: none; text-align: center; transition: border-color 0.15s; }
  .ing-num-field input:focus { border-color: var(--accent); }
  .ing-save-btn { width: 100%; background: var(--accent); color: #1C1C1A; border: none; border-radius: 7px; font-family: var(--font); font-size: 13px; font-weight: 600; padding: 9px; cursor: pointer; transition: background 0.15s; }
  .ing-save-btn:hover { background: #d08840; }

  /* New ingredient form */
  .new-ing-card { background: var(--bg2); border: 1px dashed var(--border); border-radius: 10px; padding: 12px; }
  .new-ing-card .ing-form-name { margin-top: 0; }

  /* ── Settings ── */
  .settings-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 0.9rem 1.1rem; margin-bottom: 1rem; }
  .settings-card h3 { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 0.7rem; }
  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-row label { font-size: 13px; color: var(--muted); }
  .setting-row input { background: var(--bg3); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--font); font-size: 14px; padding: 5px 9px; width: 90px; text-align: right; outline: none; }
  .setting-row input:focus { border-color: var(--accent); }
  .danger-zone { margin-top: 1.5rem; }
  .danger-zone .settings-card { border-color: #4a2020; }

  /* ── Toast ── */
  #toast { position: fixed; bottom: 1.25rem; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--bg3); border: 1px solid var(--border); border-radius: 20px; padding: 8px 18px; font-size: 13px; color: var(--text); opacity: 0; transition: transform 0.22s, opacity 0.22s; pointer-events: none; white-space: nowrap; z-index: 100; }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 380px) {
    .fast-row { grid-template-columns: repeat(2, 1fr) auto; }
    .four-cols { grid-template-columns: repeat(2, 1fr); }
    .ing-nums { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span class="app-title">Macro Tracker</span>
    <span class="date-badge" id="date-badge"></span>
  </div>
  <div class="goals-main">
    <div class="goal">
      <div class="goal-head">
        <span class="goal-label" style="color:var(--accent)">Calories</span>
        <span class="goal-remain" id="kcal-remain"></span>
      </div>
      <div class="goal-val" style="color:var(--accent)" id="kcal-cur">0 <span>kcal</span></div>
      <div class="track"><div class="fill" id="kcal-fill" style="width:0%;background:var(--accent)"></div></div>
    </div>
    <div class="goal">
      <div class="goal-head">
        <span class="goal-label" style="color:var(--green)">Protéines</span>
        <span class="goal-remain" id="prot-remain"></span>
      </div>
      <div class="goal-val" style="color:var(--green)" id="prot-cur">0 <span>g</span></div>
      <div class="track"><div class="fill" id="prot-fill" style="width:0%;background:var(--green)"></div></div>
    </div>
  </div>
  <div class="goals-sec">
    <div class="goal-sm">
      <span class="goal-sm-label" style="color:var(--blue)">Glucides</span>
      <span class="goal-sm-val" style="color:var(--blue)" id="carb-cur">0 <span>g</span></span>
    </div>
    <div class="goal-sm">
      <span class="goal-sm-label" style="color:var(--purple)">Fibres</span>
      <span class="goal-sm-val" style="color:var(--purple)" id="fiber-cur">0 <span>g</span></span>
    </div>
  </div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="add">Ajouter</button>
  <button class="tab" data-tab="log">Journal</button>
  <button class="tab" data-tab="ingredients">Aliments</button>
  <button class="tab" data-tab="settings">Objectifs</button>
</div>

<main>

  <!-- Ajouter -->
  <div class="panel active" id="panel-add">
    <div class="section-label" style="margin-top:0">Saisie rapide — chiffres uniquement</div>
    <div class="fast-box">
      <div class="fast-row">
        <div class="fast-field"><label style="color:var(--accent)">Kcal</label><input type="number" id="f-kcal" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="fast-field"><label style="color:var(--green)">Prot g</label><input type="number" id="f-prot" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="fast-field"><label style="color:var(--blue)">Gluc g</label><input type="number" id="f-carb" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="fast-field"><label style="color:var(--purple)">Fibr g</label><input type="number" id="f-fiber" placeholder="0" min="0" inputmode="numeric" /></div>
        <button class="fast-add-btn" id="btn-fast" aria-label="Ajouter">+</button>
      </div>
    </div>
    <div class="section-label">Raccourcis aliments</div>
    <div class="quick-grid" id="quick-grid"></div>
    <div class="section-label">Avec nom d'aliment</div>
    <div class="form-grid">
      <div class="field"><label>Aliment</label><input type="text" id="inp-name" placeholder="ex. Poulet rôti, skyr…" autocomplete="off" /></div>
      <div class="four-cols">
        <div class="field"><label style="color:var(--accent)">Kcal</label><input type="number" id="inp-kcal" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="field"><label style="color:var(--green)">Prot g</label><input type="number" id="inp-prot" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="field"><label style="color:var(--blue)">Gluc g</label><input type="number" id="inp-carb" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="field"><label style="color:var(--purple)">Fibr g</label><input type="number" id="inp-fiber" placeholder="0" min="0" inputmode="numeric" /></div>
      </div>
      <button class="btn-primary" id="btn-add">+ Ajouter au journal</button>
    </div>
  </div>

  <!-- Journal -->
  <div class="panel" id="panel-log">
    <div id="log-content"></div>
  </div>

  <!-- Aliments -->
  <div class="panel" id="panel-ingredients">
    <div class="section-label" style="margin-top:0">Modifier les raccourcis</div>
    <div class="ing-list" id="ing-list"></div>
    <div class="section-label">Ajouter un aliment</div>
    <div class="new-ing-card">
      <input class="ing-form-name" type="text" id="new-ing-name" placeholder="Nom de l'aliment…" autocomplete="off" />
      <div class="ing-nums">
        <div class="ing-num-field"><label style="color:var(--accent)">Kcal</label><input type="number" id="new-ing-kcal" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="ing-num-field"><label style="color:var(--green)">Prot g</label><input type="number" id="new-ing-prot" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="ing-num-field"><label style="color:var(--blue)">Gluc g</label><input type="number" id="new-ing-carb" placeholder="0" min="0" inputmode="numeric" /></div>
        <div class="ing-num-field"><label style="color:var(--purple)">Fibr g</label><input type="number" id="new-ing-fiber" placeholder="0" min="0" inputmode="numeric" /></div>
      </div>
      <button class="ing-save-btn" id="btn-new-ing">+ Ajouter aux raccourcis</button>
    </div>
  </div>

  <!-- Objectifs -->
  <div class="panel" id="panel-settings">
    <div class="settings-card">
      <h3>Objectifs journaliers</h3>
      <div class="setting-row"><label>Calories (kcal)</label><input type="number" id="s-kcal" inputmode="numeric" /></div>
      <div class="setting-row"><label>Protéines (g)</label><input type="number" id="s-prot" inputmode="numeric" /></div>
      <div class="setting-row"><label>Glucides (g)</label><input type="number" id="s-carb" inputmode="numeric" /></div>
      <div class="setting-row"><label>Fibres (g)</label><input type="number" id="s-fiber" inputmode="numeric" /></div>
    </div>
    <button class="btn-primary" id="btn-save-goals">Enregistrer</button>
    <div class="danger-zone">
      <div class="settings-card">
        <h3 style="color:#D9534F">Remise à zéro</h3>
        <div class="setting-row" style="border:none">
          <label style="font-size:12px">Effacer le journal du jour</label>
          <button class="btn-secondary" id="btn-reset">Reset</button>
        </div>
      </div>
    </div>
  </div>

</main>
<div id="toast"></div>

<script>
const DEFAULT_QUICK = [
  { id:1,  name:'Skyr 150g',        kcal:98,  prot:16, carb:6,  fiber:0 },
  { id:2,  name:'Œuf entier',       kcal:78,  prot:6,  carb:0,  fiber:0 },
  { id:3,  name:"Blanc d'œuf ×1",   kcal:17,  prot:4,  carb:0,  fiber:0 },
  { id:4,  name:'Poulet 150g',      kcal:165, prot:31, carb:0,  fiber:0 },
  { id:5,  name:'Whey 30g',         kcal:110, prot:21, carb:4,  fiber:0 },
  { id:6,  name:'Thon 100g',        kcal:116, prot:25, carb:0,  fiber:0 },
  { id:7,  name:'Flocons 50g',      kcal:185, prot:6,  carb:32, fiber:4 },
  { id:8,  name:'Fb blanc 0% 200g', kcal:80,  prot:16, carb:6,  fiber:0 },
  { id:9,  name:'Saumon 130g',      kcal:221, prot:28, carb:0,  fiber:0 },
  { id:10, name:'Riz cuit 150g',    kcal:175, prot:4,  carb:38, fiber:1 },
  { id:11, name:'Amandes 30g',      kcal:174, prot:5,  carb:6,  fiber:3 },
  { id:12, name:'Cottage 200g',     kcal:156, prot:22, carb:6,  fiber:0 },
  { id:13, name:'Steak 150g',       kcal:243, prot:34, carb:0,  fiber:0 },
  { id:14, name:'Lentilles 150g',   kcal:159, prot:12, carb:27, fiber:8 },
  { id:15, name:'Banane',           kcal:90,  prot:1,  carb:23, fiber:3 },
  { id:16, name:'Pomme',            kcal:55,  prot:0,  carb:14, fiber:2 },
];

const DAY_KEY = () => 'entries_' + new Date().toISOString().slice(0,10);
function load(k,d){ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } }
function save(k,v){ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} }

let goals   = load('goals',   { kcal:1500, prot:150, carb:150, fiber:25 });
let entries = load(DAY_KEY(), []);
let quick   = load('quick',   DEFAULT_QUICK);

const fmt = n => Math.round(n);
const pct = (v,m) => Math.min(100, Math.round(v/m*100));

function totals(){
  return entries.reduce((a,e)=>{ a.kcal+=e.kcal; a.prot+=e.prot; a.carb+=e.carb; a.fiber+=e.fiber; return a; },
    { kcal:0, prot:0, carb:0, fiber:0 });
}
function fillClass(v,m){ const r=v/m; return r>=1.05?'over':r>=0.9?'ok':''; }

function renderHeader(){
  const t = totals();
  document.getElementById('kcal-cur').innerHTML  = fmt(t.kcal)  + ' <span>kcal</span>';
  document.getElementById('prot-cur').innerHTML  = fmt(t.prot)  + ' <span>g</span>';
  document.getElementById('carb-cur').innerHTML  = fmt(t.carb)  + ' <span>g</span>';
  document.getElementById('fiber-cur').innerHTML = fmt(t.fiber) + ' <span>g</span>';
  const rK = Math.max(0, goals.kcal - t.kcal);
  const rP = Math.max(0, goals.prot - t.prot);
  document.getElementById('kcal-remain').textContent = rK>0 ? '-'+fmt(rK) : '+'+fmt(t.kcal-goals.kcal);
  document.getElementById('prot-remain').textContent = rP>0 ? '-'+fmt(rP)+'g' : '+'+fmt(t.prot-goals.prot)+'g';
  const kf = document.getElementById('kcal-fill');
  kf.style.width = pct(t.kcal,goals.kcal)+'%';
  kf.className = 'fill '+fillClass(t.kcal,goals.kcal);
  if(!kf.className.includes('ok')&&!kf.className.includes('over')) kf.style.background='var(--accent)';
  const pf = document.getElementById('prot-fill');
  pf.style.width = pct(t.prot,goals.prot)+'%';
  pf.className = 'fill '+fillClass(t.prot,goals.prot);
  if(!pf.className.includes('ok')&&!pf.className.includes('over')) pf.style.background='var(--green)';
}

function renderQuick(){
  document.getElementById('quick-grid').innerHTML = quick.map(q=>{
    const fs = q.fiber ? ` · <span class="f">${q.fiber}g F</span>` : '';
    return `<button class="qbtn" onclick='quickAdd(${JSON.stringify(q)})'>
      <div class="qbtn-name">${q.name}</div>
      <div class="qbtn-macros">${q.kcal} kcal · <span class="p">${q.prot}g P</span>${fs}</div>
    </button>`;
  }).join('');
}

function renderLog(){
  const c = document.getElementById('log-content');
  if(!entries.length){
    c.innerHTML='<div class="log-empty">Aucun aliment enregistré<br><span style="font-size:12px">Utilisez la saisie rapide →</span></div>';
    return;
  }
  const t = totals();
  const rows = entries.slice().reverse().map(e=>{
    const sub=[e.time, e.carb?fmt(e.carb)+'g G':null, e.fiber?fmt(e.fiber)+'g F':null].filter(Boolean).join(' · ');
    return `<div class="log-entry">
      <div class="log-dot"></div>
      <div class="log-info">
        <div class="log-name">${e.name}</div>
        <div class="log-sub">${sub}</div>
      </div>
      <div class="log-right">
        <div class="log-kcal">${fmt(e.kcal)} kcal</div>
        <div class="log-prot">${fmt(e.prot)}g P</div>
      </div>
      <button class="log-del" onclick="remove(${e.id})" aria-label="Supprimer">×</button>
    </div>`;
  }).join('');
  c.innerHTML = rows + `<div class="log-total">
    <span class="total-label">Total</span>
    <span class="total-val">${fmt(t.kcal)} kcal · ${fmt(t.prot)}g P · ${fmt(t.carb)}g G · ${fmt(t.fiber)}g F</span>
  </div>`;
}

function renderIngredients(){
  const list = document.getElementById('ing-list');
  list.innerHTML = quick.map((q,i)=>{
    const fs = q.fiber ? ` · ${q.fiber}g F` : '';
    return `<div class="ing-card" id="ing-card-${q.id}">
      <div class="ing-header">
        <div>
          <div class="ing-name-display">${q.name}</div>
          <div class="ing-macros-display">${q.kcal} kcal · ${q.prot}g P · ${q.carb}g G${fs}</div>
        </div>
        <div class="ing-header-right">
          <button class="ing-edit-btn" onclick="toggleEdit(${q.id})" id="edit-btn-${q.id}">Modifier</button>
          <button class="ing-del-btn" onclick="deleteIng(${q.id})" aria-label="Supprimer">×</button>
        </div>
      </div>
      <div class="ing-form" id="ing-form-${q.id}">
        <input class="ing-form-name" type="text" id="ing-n-${q.id}" value="${q.name}" placeholder="Nom" />
        <div class="ing-nums">
          <div class="ing-num-field"><label style="color:var(--accent)">Kcal</label><input type="number" id="ing-k-${q.id}" value="${q.kcal}" min="0" inputmode="numeric" /></div>
          <div class="ing-num-field"><label style="color:var(--green)">Prot g</label><input type="number" id="ing-p-${q.id}" value="${q.prot}" min="0" inputmode="numeric" /></div>
          <div class="ing-num-field"><label style="color:var(--blue)">Gluc g</label><input type="number" id="ing-c-${q.id}" value="${q.carb}" min="0" inputmode="numeric" /></div>
          <div class="ing-num-field"><label style="color:var(--purple)">Fibr g</label><input type="number" id="ing-f-${q.id}" value="${q.fiber}" min="0" inputmode="numeric" /></div>
        </div>
        <button class="ing-save-btn" onclick="saveIng(${q.id})">Enregistrer</button>
      </div>
    </div>`;
  }).join('');
}

function toggleEdit(id){
  const form = document.getElementById('ing-form-'+id);
  const btn  = document.getElementById('edit-btn-'+id);
  const open = form.classList.toggle('open');
  btn.classList.toggle('active', open);
  btn.textContent = open ? 'Fermer' : 'Modifier';
  if(open) document.getElementById('ing-n-'+id).focus();
}

function saveIng(id){
  const idx = quick.findIndex(q=>q.id===id);
  if(idx===-1) return;
  quick[idx] = {
    id,
    name:  document.getElementById('ing-n-'+id).value.trim() || quick[idx].name,
    kcal:  +document.getElementById('ing-k-'+id).value || 0,
    prot:  +document.getElementById('ing-p-'+id).value || 0,
    carb:  +document.getElementById('ing-c-'+id).value || 0,
    fiber: +document.getElementById('ing-f-'+id).value || 0,
  };
  save('quick', quick);
  renderIngredients();
  renderQuick();
  toast('✓ '+quick[idx].name+' mis à jour');
}

function deleteIng(id){
  const q = quick.find(x=>x.id===id);
  if(!q || !confirm('Supprimer "'+q.name+'" des raccourcis ?')) return;
  quick = quick.filter(x=>x.id!==id);
  save('quick', quick);
  renderIngredients();
  renderQuick();
  toast('Aliment supprimé');
}

function renderSettings(){
  document.getElementById('s-kcal').value  = goals.kcal;
  document.getElementById('s-prot').value  = goals.prot;
  document.getElementById('s-carb').value  = goals.carb;
  document.getElementById('s-fiber').value = goals.fiber;
}

function render(){ renderHeader(); renderLog(); }
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),1800);
}

function addEntry(name, kcal, prot, carb, fiber){
  const time = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  entries.push({ id:Date.now(), name, kcal:+kcal||0, prot:+prot||0, carb:+carb||0, fiber:+fiber||0, time });
  save(DAY_KEY(), entries);
  render();
  toast('✓ '+name+' ajouté');
}

function quickAdd(q){ addEntry(q.name, q.kcal, q.prot, q.carb, q.fiber); }

function remove(id){
  entries = entries.filter(e=>e.id!==id);
  save(DAY_KEY(), entries);
  render();
}

// Tabs
document.querySelectorAll('.tab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    const tab = btn.dataset.tab;
    document.getElementById('panel-'+tab).classList.add('active');
    if(tab==='ingredients') renderIngredients();
  });
});

// Saisie rapide
document.getElementById('btn-fast').addEventListener('click',()=>{
  const kcal=document.getElementById('f-kcal').value, prot=document.getElementById('f-prot').value,
        carb=document.getElementById('f-carb').value, fiber=document.getElementById('f-fiber').value;
  if(!kcal&&!prot&&!carb&&!fiber){ document.getElementById('f-kcal').focus(); return; }
  const time=new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  addEntry('Repas '+time, kcal, prot, carb, fiber);
  ['f-kcal','f-prot','f-carb','f-fiber'].forEach(id=>document.getElementById(id).value='');
});
document.getElementById('f-fiber').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('btn-fast').click(); });

// Manuel
document.getElementById('btn-add').addEventListener('click',()=>{
  const name=document.getElementById('inp-name').value.trim();
  if(!name){ document.getElementById('inp-name').focus(); return; }
  addEntry(name, document.getElementById('inp-kcal').value, document.getElementById('inp-prot').value,
           document.getElementById('inp-carb').value, document.getElementById('inp-fiber').value);
  ['inp-name','inp-kcal','inp-prot','inp-carb','inp-fiber'].forEach(id=>document.getElementById(id).value='');
});
document.getElementById('inp-fiber').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('btn-add').click(); });

// Nouvel aliment
document.getElementById('btn-new-ing').addEventListener('click',()=>{
  const name=document.getElementById('new-ing-name').value.trim();
  if(!name){ document.getElementById('new-ing-name').focus(); return; }
  const newId = Date.now();
  quick.push({
    id: newId,
    name,
    kcal:  +document.getElementById('new-ing-kcal').value  || 0,
    prot:  +document.getElementById('new-ing-prot').value  || 0,
    carb:  +document.getElementById('new-ing-carb').value  || 0,
    fiber: +document.getElementById('new-ing-fiber').value || 0,
  });
  save('quick', quick);
  ['new-ing-name','new-ing-kcal','new-ing-prot','new-ing-carb','new-ing-fiber'].forEach(id=>document.getElementById(id).value='');
  renderIngredients();
  renderQuick();
  toast('✓ '+name+' ajouté aux raccourcis');
});
document.getElementById('new-ing-fiber').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('btn-new-ing').click(); });

// Objectifs
document.getElementById('btn-save-goals').addEventListener('click',()=>{
  goals.kcal=parseInt(document.getElementById('s-kcal').value)||1500;
  goals.prot=parseInt(document.getElementById('s-prot').value)||150;
  goals.carb=parseInt(document.getElementById('s-carb').value)||150;
  goals.fiber=parseInt(document.getElementById('s-fiber').value)||25;
  save('goals',goals); render(); toast('Objectifs enregistrés');
});

// Reset
document.getElementById('btn-reset').addEventListener('click',()=>{
  if(!confirm('Remettre le journal à zéro ?')) return;
  entries=[]; save(DAY_KEY(),entries); render(); toast('Journal remis à zéro');
});

// Date
const d=new Date();
document.getElementById('date-badge').textContent=d.toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});

// Init
renderQuick(); renderSettings(); render();
const ms=new Date(d.getFullYear(),d.getMonth(),d.getDate()+1)-d;
setTimeout(()=>{ entries=[]; save(DAY_KEY(),entries); render(); }, ms);
</script>
</body>
</html>
